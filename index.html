  <style>
  .today-outfit{background:linear-gradient(145deg,#fffdf8,#e8eee9);border:1px solid var(--line);border-radius:26px;padding:22px;text-align:center}.today-outfit h2{font:700 30px Georgia,serif;margin:4px}.today-outfit h3{font-size:22px;margin:14px 0 5px}.today-reason{color:var(--muted);max-width:620px;margin:0 auto 16px}.outfit-illustration{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px auto 8px;max-width:520px}.outfit-illustration>div{display:grid;justify-items:center;gap:7px}.color-orb{width:86px;height:86px;border-radius:30px;display:grid;place-items:center;font-size:43px;background:var(--item-color);border:1px solid #0001}.outfit-illustration b{font-size:12px}.conditions summary,.panel summary{font-weight:800;cursor:pointer}.news-list{display:grid;gap:8px}.news-item{display:flex;align-items:center;gap:10px;background:#f1f3ef;border-radius:14px;padding:9px 12px}.news-item p{margin:0}.item-copy{flex:1}.mini-actions,.suggestions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.suggest-button{background:linear-gradient(135deg,#315d48,#b68a48);color:white}.candidate-box{display:grid;gap:8px;margin-top:12px;padding:12px;background:#f1eee5;border-radius:14px}.candidate-box label{display:flex;align-items:center;gap:8px}.candidate-box input{width:auto;min-height:auto}.karte-hero{display:flex;align-items:center;gap:16px;background:white;border-radius:20px;padding:15px;margin:14px 0}.karte-hero .photo{width:110px;height:110px}.completeness{background:#17231d;color:white;border-radius:20px;padding:16px;margin-bottom:14px}.completeness>div:first-child{display:flex;justify-content:space-between}.completeness strong{font-size:24px}.completeness progress{width:100%;height:13px;margin:10px 0;accent-color:#d5a65e}.check-list{display:flex;gap:12px;flex-wrap:wrap;font-size:12px}.karte-data{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0}.karte-data p{display:grid;margin:0;padding:10px;background:white;border-radius:12px}.karte-data b{font-size:11px;color:var(--muted)}.maintenance-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.maintenance-log{display:grid;gap:4px;margin-top:10px;color:var(--muted)}.calendar-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:8px 0}.activity-grid{display:grid;grid-template-rows:repeat(7,12px);grid-auto-flow:column;grid-auto-columns:12px;gap:4px;overflow:auto;padding:4px}.activity{width:12px;height:12px;border-radius:3px;background:#e2e4df}.activity.worn{background:#4f8769}.activity.care{background:#d29a4d}.activity.rain{background:#4d7eaa}.insight-card{width:100%;display:grid;grid-template-columns:28px 52px 1fr auto;align-items:center;gap:9px;background:transparent;text-align:left;border-bottom:1px solid var(--line);border-radius:0}.insight-card .photo{width:52px;height:52px}.insight-card small{display:block;color:var(--muted)}.insight-card>strong{font-size:12px;color:var(--accent)}

  @media(max-width:650px){.stylist-character{width:155px}.stylist-character svg{height:175px}.today-outfit{padding:18px}.outfit-illustration{margin-top:8px}.recommendation{grid-template-columns:30px 58px 1fr;padding:13px}.recommendation .photo{width:58px;height:58px}.recommendation p{font-size:13px}.section-title>.mini-actions{justify-content:flex-end}.section-title>.mini-actions button{padding:9px 10px;font-size:12px}}

ls>summary{font-size:16px;padding:5px}.inner-panel{margin-top:12px}.purchase-fields{margin-top:12px}.sticky-actions{position:sticky;bottom:calc(-20px - env(safe-area-inset-bottom));z-index:3;background:#f0f2ec;padding:12px 0 calc(20px + env(safe-area-inset-bottom));box-shadow:0 -10px 22px #17231d12}.registration-done{text-align:center;background:linear-gradient(180deg,#fffdf8,#e7efe9)}.registration-done>.photo{width:130px;height:130px;margin:12px auto}.registration-done .celebrate{font-size:56px;animation:celebrate .5s ease-out}.registration-done .actions{display:grid;grid-template-columns:repeat(2,1fr)}@keyframes celebrate{from{opacity:0;transform:scale(.4) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}.stylist-character.improved{width:210px}.stylist-character.improved svg{height:235px}
  @media(max-width:650px){.register-steps.five span{font-size:9px}.color-candidates{gap:5px}.color-choice{padding:8px 3px}.quick-section{padding:14px}.registration-done .actions{grid-template-columns:1fr}.stylist-character.improved{width:175px}.stylist-character.improved svg{height:195px}}
